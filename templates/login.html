<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Smart Health Surveillance System</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh; display: flex; justify-content: center; align-items: center;
    padding: 20px;
}
.login-container {
    background: white; border-radius: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    width: 100%; max-width: 420px; padding: 40px;
}
.header { text-align: center; margin-bottom: 28px; }
.header h1 { color: #333; font-size: 28px; margin-bottom: 8px; }
.header p { color: #666; font-size: 14px; }
.form-group { margin-bottom: 18px; }
label { display: block; color: #333; font-weight: 600; margin-bottom: 6px; font-size: 13px; }
input[type="text"], input[type="password"] {
    width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 8px;
    font-size: 14px; transition: border-color 0.2s;
}
input:focus { outline: none; border-color: #667eea; }
.submit-btn {
    width: 100%; padding: 13px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: transform 0.15s;
}
.submit-btn:hover { transform: translateY(-2px); }
.error-message, .success-message {
    padding: 12px; border-radius: 8px; margin-bottom: 18px; display: none; font-size: 13px;
}
.error-message { background: #fee; color: #c33; }
.success-message { background: #efe; color: #3a3; }
.links-row { display: flex; justify-content: space-between; margin-top: 18px; font-size: 13px; }
.links-row a { color: #667eea; text-decoration: none; font-weight: 600; }
.links-row a:hover { text-decoration: underline; }
.demo-credentials {
    background: #f7f7fb; border-left: 4px solid #667eea; padding: 14px;
    margin-top: 22px; border-radius: 8px; font-size: 12.5px; color: #555; line-height: 1.7;
}
.demo-credentials strong { color: #333; }
</style>
</head>
<body>
<div class="login-container">
    <div class="header">
        <h1>🏥 Health Watch</h1>
        <p>Smart Health Surveillance &amp; Early Warning System</p>
    </div>

    <div class="error-message" id="errorMsg"></div>
    <div class="success-message" id="successMsg"></div>

    <form id="loginForm">
        <div class="form-group">
            <label for="username">Username or Email</label>
            <input type="text" id="username" required autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="submit-btn">Login</button>
    </form>

    <div class="links-row">
        <a href="/forgot-password">Forgot password?</a>
        <a href="/register">Create an account</a>
    </div>

    <div class="demo-credentials">
        <strong>Demo accounts (any password shown):</strong><br>
        Admin &mdash; admin / admin123<br>
        Health Officer &mdash; officer1 / pass123<br>
        ASHA Worker &mdash; asha1 / pass123<br>
        Community Volunteer &mdash; volunteer1 / pass123
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';

    try {
        const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
            successMsg.textContent = 'Login successful. Redirecting...';
            successMsg.style.display = 'block';
            setTimeout(() => window.location.href = '/dashboard', 700);
        } else {
            errorMsg.textContent = data.message || 'Login failed.';
            errorMsg.style.display = 'block';
        }
    } catch (err) {
        errorMsg.textContent = 'Connection error: ' + err.message;
        errorMsg.style.display = 'block';
    }
});
</script>
</body>
</html>
