<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - Health Watch</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
}
.box {
    background: white; border-radius: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    width: 100%; max-width: 420px; padding: 40px;
}
.header { text-align: center; margin-bottom: 24px; }
.header h1 { color: #333; font-size: 24px; margin-bottom: 8px; }
.header p { color: #666; font-size: 13.5px; }
.form-group { margin-bottom: 18px; }
label { display: block; color: #333; font-weight: 600; margin-bottom: 6px; font-size: 13px; }
input { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
input:focus { outline: none; border-color: #667eea; }
.submit-btn {
    width: 100%; padding: 13px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
}
.result-box { padding: 14px; border-radius: 8px; margin-bottom: 18px; display: none; font-size: 13px; line-height: 1.6; }
.result-box.success { background: #eef; color: #335; border-left: 4px solid #667eea; }
.back-link { text-align: center; margin-top: 18px; font-size: 13.5px; }
.back-link a { color: #667eea; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="box">
    <div class="header">
        <h1>🔑 Reset Password</h1>
        <p>Enter the email linked to your account.</p>
    </div>

    <div class="result-box" id="resultBox"></div>

    <form id="forgotForm">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required>
        </div>
        <button type="submit" class="submit-btn">Send Reset Instructions</button>
    </form>

    <div class="back-link"><a href="/login">← Back to login</a></div>
</div>

<script>
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const box = document.getElementById('resultBox');

    try {
        const res = await fetch('/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const data = await res.json();
        box.className = 'result-box success';
        box.innerHTML = `<strong>${data.message}</strong>` + (data.demo_note ? `<br><br>${data.demo_note}` : '');
        box.style.display = 'block';
    } catch (err) {
        box.className = 'result-box success';
        box.textContent = 'Connection error: ' + err.message;
        box.style.display = 'block';
    }
});
</script>
</body>
</html>
